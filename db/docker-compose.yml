version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: devops_assessment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devops_assessment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops_network

volumes:
  postgres_data:

networks:
  devops_network:
    driver: bridge
